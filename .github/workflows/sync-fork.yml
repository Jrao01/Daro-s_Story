name: Sync Fork

on:
  schedule:
    - cron: '0 3 * * *' # 11:00 PM Venezuela (03:00 UTC)
  workflow_dispatch:      

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Configurar Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add upstream https://github.com/rieraojedadiegoalejandro-create/cuento.git

      - name: Sincronizar con el origen
        run: |
          git fetch upstream main
          git merge upstream/main
          git push origin main
